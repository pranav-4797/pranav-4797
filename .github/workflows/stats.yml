# Generates GitHub stats, streak, top languages, and trophy SVGs
# and commits them directly to the repo so they never break.
name: Generate GitHub Stats

on:
  schedule:
    - cron: "0 */6 * * *"  # Every 6 hours
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  generate-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create output directory
        run: mkdir -p stats

      # GitHub Stats Card
      - name: Generate GitHub Stats
        run: |
          curl -s -o stats/github-stats.svg \
            "https://github-readme-stats.vercel.app/api?username=pranav-4797&show_icons=true&theme=algolia&hide_border=true&bg_color=0d1117&title_color=0ea5e9&icon_color=38bdf8&text_color=c9d1d9&include_all_commits=true&count_private=true&ring_color=0ea5e9&cache_seconds=21600"
          # Fallback: if the file is empty or an error page, try alternate instance
          if [ ! -s stats/github-stats.svg ] || grep -q "error" stats/github-stats.svg 2>/dev/null; then
            curl -s -o stats/github-stats.svg \
              "https://github-readme-stats-eight-theta.vercel.app/api?username=pranav-4797&show_icons=true&theme=algolia&hide_border=true&bg_color=0d1117&title_color=0ea5e9&icon_color=38bdf8&text_color=c9d1d9&include_all_commits=true&count_private=true"
          fi

      # Top Languages Card
      - name: Generate Top Languages
        run: |
          curl -s -o stats/top-langs.svg \
            "https://github-readme-stats.vercel.app/api/top-langs/?username=pranav-4797&theme=algolia&hide_border=true&bg_color=0d1117&title_color=0ea5e9&text_color=c9d1d9&layout=compact&langs_count=10&cache_seconds=21600"
          if [ ! -s stats/top-langs.svg ] || grep -q "error" stats/top-langs.svg 2>/dev/null; then
            curl -s -o stats/top-langs.svg \
              "https://github-readme-stats-eight-theta.vercel.app/api/top-langs/?username=pranav-4797&theme=algolia&hide_border=true&bg_color=0d1117&title_color=0ea5e9&text_color=c9d1d9&layout=compact&langs_count=10"
          fi

      # Streak Stats
      - name: Generate Streak Stats
        run: |
          curl -s -o stats/streak-stats.svg \
            "https://nirzak-streak-stats.vercel.app/?user=pranav-4797&theme=algolia&hide_border=true&background=0d1117&ring=0ea5e9&fire=38bdf8&currStreakLabel=0ea5e9&sideLabels=c9d1d9"

      # Trophy Card
      - name: Generate Trophy Card
        run: |
          curl -s -o stats/trophies.svg \
            "https://github-profile-trophy.vercel.app/?username=pranav-4797&theme=algolia&no-frame=true&no-bg=true&column=7&margin-w=10"

      # Activity Graph
      - name: Generate Activity Graph
        run: |
          curl -s -o stats/activity-graph.svg \
            "https://github-readme-activity-graph.vercel.app/graph?username=pranav-4797&bg_color=0d1117&color=0ea5e9&line=38bdf8&point=ffffff&area=true&area_color=0ea5e9&hide_border=true&custom_title=Pranav%27s%20Contribution%20Graph"

      - name: Commit & Push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add stats/
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update GitHub stats SVGs" && git push)
